name: Sync to HuggingFace Spaces

on:
  push:
    branches:
      - main

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # get full history
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "102027682+BhushanPawar-01@users.noreply.github.coms"
          git config --global user.name "Bhushan Pawar"
          git push https://BhushanP-01:${HF_TOKEN}@huggingface.co/spaces/BhushanP-01/itihas main --force